<!doctype html>
<html lang="en">
  <head>
    <title>Register - Apex Tech</title>
    <link rel="stylesheet" href="output.css" />
    <style>
      body {
        background-color: #f0f4f8;
        background-image: url("images/Cover/test.jpg");
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen">
    <div
      class="w-full max-w-md bg-white p-8 rounded-xl shadow-2xl border border-green-200"
    >
      <h1 class="text-3xl font-bold text-center text-green-700 mb-6">
        Create Account
      </h1>

      <form method="POST" action="register.php" class="space-y-6">
        <input type="hidden" name="action" value="register" />

        <div>
          <label for="username" class="block text-sm font-medium text-gray-700"
            >Username</label
          >
          <input
            type="text"
            id="username"
            name="username"
            required
            class="mt-1 block w-full border border-gray-300 rounded-lg p-3 focus:ring-green-500 focus:border-green-500"
          />
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700"
            >Email</label
          >
          <input
            type="email"
            id="email"
            name="email"
            required
            class="mt-1 block w-full border border-gray-300 rounded-lg p-3 focus:ring-green-500 focus:border-green-500"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700"
            >Password</label
          >
          <input
            type="password"
            id="password"
            name="password"
            required
            class="mt-1 block w-full border border-gray-300 rounded-lg p-3 focus:ring-green-500 focus:border-green-500"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-green-500 text-white py-3 rounded-lg font-bold text-lg hover:bg-green-600 transition duration-150"
        >
          Register
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">
          Already have an account?
          <a
            href="login.html"
            class="text-green-600 hover:text-green-800 font-semibold"
            >Log in here</a
          >
        </p>
        <p class="text-sm text-gray-600 mt-2">
          <a href="index.php" class="text-gray-500 hover:text-gray-700"
            >← Back to Shop</a
          >
        </p>
      </div>
    </div>
  </body>
</html>
