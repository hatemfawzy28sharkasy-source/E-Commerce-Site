<!doctype html>
<html lang="en">
  <head>
    <title>Contact Us - Apex Tech</title>
    <link rel="stylesheet" href="output.css" />
    <style>
      body {
        background-color: #f0f4f8;
        background-image: url("images/Cover/test.jpg");
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen">
    <div
      class="w-full max-w-md bg-white p-8 rounded-xl shadow-2xl border border-yellow-300"
    >
      <h1 class="text-3xl font-bold text-center text-yellow-700 mb-6">
        Contact Our Team
      </h1>
      <p class="text-center text-gray-600 mb-6">
        We'll get back to you within 24 hours.
      </p>

      <form method="POST" action="contact.php" class="space-y-6">
        <input type="hidden" name="action" value="contact" />

        <div>
          <label for="name" class="block text-sm font-medium text-gray-700"
            >Your Name</label
          >
          <input
            type="text"
            id="name"
            name="name"
            required
            class="mt-1 block w-full border border-gray-300 rounded-lg p-3 focus:ring-yellow-500 focus:border-yellow-500"
          />
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700"
            >Your Email</label
          >
          <input
            type="email"
            id="email"
            name="email"
            required
            class="mt-1 block w-full border border-gray-300 rounded-lg p-3 focus:ring-yellow-500 focus:border-yellow-500"
          />
        </div>

        <div>
          <label for="message" class="block text-sm font-medium text-gray-700"
            >Message</label
          >
          <textarea
            id="message"
            name="message"
            rows="4"
            required
            class="mt-1 block w-full border border-gray-300 rounded-lg p-3 focus:ring-yellow-500 focus:border-yellow-500"
          ></textarea>
        </div>

        <button
          type="submit"
          class="w-full bg-yellow-500 text-white py-3 rounded-lg font-bold text-lg hover:bg-yellow-600 transition duration-150"
        >
          Send Message
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600 mt-2">
          <a href="index.php" class="text-gray-500 hover:text-gray-700"
            >← Back to Shop</a
          >
        </p>
      </div>
    </div>
  </body>
</html>
